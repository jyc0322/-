<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>筛分数据随机生成器 V3 (精准控制版)</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        .control-panel { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; padding: 15px; background: #eef2f5; border-radius: 5px; }
        .control-group { border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; min-width: 250px; background: white; }
        .control-group h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #0056b3; }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .input-row input[type="range"] { width: 100px; cursor: pointer; }
        .input-row input[type="number"] { width: 60px; text-align: center; border: 1px solid #ccc; border-radius: 3px; }
        .btn-generate { display: block; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .btn-generate:hover { background: #218838; }
        .tips { font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 15px; text-align: center; }
        .fixed-tip { color: #888; font-size: 12px; }
        
        /* 模拟本子表格排版 */
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: center; margin-bottom: 10px; background: white; }
        th, td { border: 2px solid #444; padding: 8px; font-size: 15px; }
        th { background-color: #f9f9f9; }
        .table-title { font-weight: bold; font-size: 16px; background-color: #e2e8f0; }
        .highlight { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

<div class="container">
    <h1>筛分数据随机生成器</h1>
    <p class="tips">提示：滑块代表的是“比例权重”，程序会自动按您设置的比例进行随机波动，并绝对保证总和为 100.00%。</p>
    
    <!-- 参数控制面板 -->
    <div class="control-panel">
        <div class="control-group">
            <h3>总重量范围设置</h3>
            <div class="input-row"><label>烧结:</label><input type="number" id="w-sj-min" value="21"> - <input type="number" id="w-sj-max" value="24"></div>
            <div class="input-row"><label>焦炭:</label><input type="number" id="w-jt-min" value="18"> - <input type="number" id="w-jt-max" value="20"></div>
            <div class="input-row"><label>块矿:</label><input type="number" id="w-kk-min" value="22"> - <input type="number" id="w-kk-max" value="24"></div>
            <div class="input-row"><label>球矿:</label><input type="number" id="w-qk-min" value="21"> - <input type="number" id="w-qk-max" value="24"></div>
            <div class="input-row"><label>返矿:</label><input type="number" id="w-fk-min" value="21"> - <input type="number" id="w-fk-max" value="24"></div>
        </div>

        <div class="control-group">
            <h3>烧结筛比例权重</h3>
            <div class="input-row"><label>＞40:</label><input type="range" id="p-sj-40" min="5" max="25" value="13" oninput="document.getElementById('v-sj-40').innerText=this.value"><span id="v-sj-40">13</span></div>
            <div class="input-row"><label>＞25:</label><input type="range" id="p-sj-25" min="15" max="35" value="23" oninput="document.getElementById('v-sj-25').innerText=this.value"><span id="v-sj-25">23</span></div>
            <div class="input-row"><label>＞16:</label><input type="range" id="p-sj-16" min="15" max="35" value="24" oninput="document.getElementById('v-sj-16').innerText=this.value"><span id="v-sj-16">24</span></div>
            <div class="input-row"><label>＞10:</label><input type="range" id="p-sj-10" min="15" max="35" value="22" oninput="document.getElementById('v-sj-10').innerText=this.value"><span id="v-sj-10">22</span></div>
            <div class="input-row"><label>＞5:</label><input type="range" id="p-sj-5" min="10" max="25" value="17" oninput="document.getElementById('v-sj-5').innerText=this.value"><span id="v-sj-5">17</span></div>
            <div class="input-row"><label>＜5:</label><span class="fixed-tip">固定区间 0.6 ~ 0.8%</span></div>
        </div>

        <div class="control-group">
            <h3>焦炭/块矿/返矿权重</h3>
            <div class="input-row"><label>焦炭＞60:</label><input type="range" id="p-jt-60" min="15" max="40" value="25" oninput="document.getElementById('v-jt-60').innerText=this.value"><span id="v-jt-60">25</span></div>
            <div class="input-row"><label>焦炭＞40:</label><input type="range" id="p-jt-40" min="40" max="70" value="50" oninput="document.getElementById('v-jt-40').innerText=this.value"><span id="v-jt-40">50</span></div>
            <div class="input-row"><label>焦炭＞25:</label><input type="range" id="p-jt-25" min="15" max="40" value="24" oninput="document.getElementById('v-jt-25').innerText=this.value"><span id="v-jt-25">24</span></div>
            <div class="input-row" style="margin-top: -5px; margin-bottom: 10px;"><label></label><span class="fixed-tip">焦炭＜25 固定区间 0.55 ~ 1.2%</span></div>
            
            <div class="input-row"><label>块矿＞16:</label><input type="range" id="p-kk-16" min="20" max="50" value="34" oninput="document.getElementById('v-kk-16').innerText=this.value"><span id="v-kk-16">34</span></div>
            <div class="input-row"><label>块矿＞10:</label><input type="range" id="p-kk-10" min="20" max="50" value="34" oninput="document.getElementById('v-kk-10').innerText=this.value"><span id="v-kk-10">34</span></div>
            <div class="input-row" style="margin-top: -5px; margin-bottom: 10px;"><label></label><span class="fixed-tip">块矿＜5 固定区间 0.7 ~ 0.9%</span></div>
            
            <div class="input-row"><label>返矿＞5:</label><input type="range" id="p-fk-5" min="10" max="15" value="12" oninput="document.getElementById('v-fk-5').innerText=this.value"><span id="v-fk-5">12</span></div>
        </div>
    </div>

    <button class="btn-generate" onclick="generateAll()">重新生成数据</button>

    <!-- 输出表格区域 -->
    <div class="grid-layout" id="output-area"></div>
</div>

<script>
    // 基础随机函数
    function rand(min, max) { return +(Math.random() * (max - min) + min).toFixed(2); }
    
    // 权重按比例归一化
    function generateProportions(configs) {
        let result = {};
        let fixedSum = 0;
        let dynamicKeys = [];
        let rawDynamicValues = {};

        // 1. 生成固定区间的值
        for (let key in configs) {
            if (configs[key].isFixed) {
                result[key] = rand(configs[key].min, configs[key].max);
                fixedSum += result[key];
            } else {
                dynamicKeys.push(key);
            }
        }

        let remaining = 100 - fixedSum; 
        let rawSum = 0;

        // 2. 提取滑块权重并加入随机波动
        for (let key of dynamicKeys) {
            let conf = configs[key];
            let base = conf.baseId ? parseFloat(document.getElementById(conf.baseId).value) : conf.defaultBase;
            let raw = base + (Math.random() * 3 - 1.5); 
            if (raw < 0.1) raw = 0.1; 
            rawDynamicValues[key] = raw;
            rawSum += raw;
        }

        // 3. 归一化分配
        let currentDynamicSum = 0;
        let largestKey = '';
        let largestVal = -1;

        for (let i = 0; i < dynamicKeys.length; i++) {
            let key = dynamicKeys[i];
            let val = +(rawDynamicValues[key] / rawSum * remaining).toFixed(2);
            result[key] = val;
            currentDynamicSum += val;
            
            if (val > largestVal) {
                largestVal = val;
                largestKey = key;
            }
        }

        // 4. 抹平精度误差
        let totalCurrent = +(currentDynamicSum + fixedSum).toFixed(2);
        let diff = +(100.00 - totalCurrent).toFixed(2);
        if (diff !== 0 && largestKey !== '') {
            result[largestKey] = +(result[largestKey] + diff).toFixed(2);
        }

        return result;
    }

    // 构建HTML表格
    function buildTable(title, totalWeight, proportions, keys) {
        let html = `<table><tr><td colspan="3" class="table-title">${title}</td></tr>
                    <tr><th>分级</th><th>重量</th><th>比例 (%)</th></tr>
                    <tr><td class="highlight">总重量</td><td class="highlight">${totalWeight}</td><td class="highlight">100.00</td></tr>`;
        
        keys.forEach(k => {
            let prop = proportions[k];
            let weight = (totalWeight * prop / 100).toFixed(2);
            html += `<tr><td>${k}</td><td>${weight}</td><td>${prop.toFixed(2)}</td></tr>`;
        });
        html += `</table>`;
        return html;
    }

    // 主生成逻辑
    function generateAll() {
        let output = document.getElementById('output-area');
        output.innerHTML = '';
        
        let wtSj = () => rand(parseFloat(document.getElementById('w-sj-min').value), parseFloat(document.getElementById('w-sj-max').value));
        let wtJt = () => rand(parseFloat(document.getElementById('w-jt-min').value), parseFloat(document.getElementById('w-jt-max').value));
        let wtKk = () => rand(parseFloat(document.getElementById('w-kk-min').value), parseFloat(document.getElementById('w-kk-max').value));
        let wtQk = () => rand(parseFloat(document.getElementById('w-qk-min').value), parseFloat(document.getElementById('w-qk-max').value));
        let wtFk = () => rand(parseFloat(document.getElementById('w-fk-min').value), parseFloat(document.getElementById('w-fk-max').value));

        // 烧结配置修改处：<5 固定在 0.6~0.8
        let sjConfig = {
            '>40': { baseId: 'p-sj-40' }, '>25': { baseId: 'p-sj-25' },
            '>16': { baseId: 'p-sj-16' }, '>10': { baseId: 'p-sj-10' },
            '>5': { baseId: 'p-sj-5' }, '<5': { isFixed: true, min: 0.6, max: 0.8 }
        };

        // 焦炭配置修改处：<25 固定在 0.55~1.2
        let jtConfig = {
            '>60': { baseId: 'p-jt-60' }, '>40': { baseId: 'p-jt-40' },
            '>25': { baseId: 'p-jt-25' }, '<25': { isFixed: true, min: 0.55, max: 1.2 }
        };

        // 块矿配置修改处：<5 固定在 0.7~0.9
        let kkConfig = {
            '>20': { defaultBase: 16 }, '>16': { baseId: 'p-kk-16' },
            '>10': { baseId: 'p-kk-10' }, '>5': { defaultBase: 16 },
            '<5': { isFixed: true, min: 0.7, max: 0.9 }
        };

        // 渲染
        output.innerHTML += `<div>${buildTable('(6) 烧结筛', wtSj(), generateProportions(sjConfig), ['>40', '>25', '>16', '>10', '>5', '<5'])}</div>`;
        output.innerHTML += `<div>${buildTable('(7) 烧结筛', wtSj(), generateProportions(sjConfig), ['>40', '>25', '>16', '>10', '>5', '<5'])}</div>`;
        
        output.innerHTML += `<div>${buildTable('(2) 焦炭筛', wtJt(), generateProportions(jtConfig), ['>60', '>40', '>25', '<25'])}</div>`;
        output.innerHTML += `<div>${buildTable('(4) 焦炭筛', wtJt(), generateProportions(jtConfig), ['>60', '>40', '>25', '<25'])}</div>`;
        output.innerHTML += `<div>${buildTable('(6) 焦炭筛', wtJt(), generateProportions(jtConfig), ['>60', '>40', '>25', '<25'])}</div>`;

        output.innerHTML += `<div>${buildTable('(1) 块矿筛', wtKk(), generateProportions(kkConfig), ['>20', '>16', '>10', '>5', '<5'])}</div>`;

        // 球矿筛 <5 的随机由于之前你要求是“1以下”，这里继续保持 0.1 ~ 0.99 随机，如果你也想改死可以随时告诉我
        let qkPropLower = rand(0.1, 0.99); 
        output.innerHTML += `<div>${buildTable('(1) 球矿筛', wtQk(), { '>5': 100 - qkPropLower, '<5': qkPropLower }, ['>5', '<5'])}</div>`;

        let wFkNow = wtFk(); 
        let baseFk = parseFloat(document.getElementById('p-fk-5').value);
        let pFkNow = baseFk + (Math.random() * 2 - 1);
        output.innerHTML += `<div><table><tr><td colspan="3" class="table-title">返矿</td></tr>
            <tr><th>分级</th><th>重量</th><th>比例 (%)</th></tr>
            <tr><td class="highlight">总重量</td><td class="highlight">${wFkNow}</td><td></td></tr>
            <tr><td>>5</td><td>${(wFkNow * pFkNow / 100).toFixed(2)}</td><td>${pFkNow.toFixed(2)}</td></tr>
            </table></div>`;
    }

    window.onload = generateAll;
</script>
</body>
</html>
